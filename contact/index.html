<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../style.css">
    <title>Contact</title>
</head>
<body>
    <nav>
        <a href="../">Home</a>
        <a href="../projects/">Projects</a>
        <a href="./">Contact</a>
        <a href="../cv/">CV</a>
        <a href="https://github.com/diegomenchaca" target="_blank">GitHub</a>
    </nav>

    <h1>Contact</h1>

    <form id="contact-form">
    <label>
      Email:
      <input type="email" name="email" value="">
    </label>

    <label>
      Subject:
      <input name="subject" value="">
    </label>

    <label>
      Message:
      <textarea name="body"></textarea>
    </label>

    <button type="submit">Send</button>
  </form>

    <script>
    document.getElementById('contact-form').addEventListener('submit', function (event) {
      event.preventDefault(); // stop normal mailto submit

      const email = 'dmenchaca805@gmail.com';
      const subject = encodeURIComponent(this.subject.value);
      const body = encodeURIComponent(this.body.value);

      window.location.href = `mailto:${email}?subject=${subject}&body=${body}`;
    });
  </script>

</body>
</html>
